name: gym_genius_flutter
description: Gym Genius - AI-Powered Fitness Companion for Android & iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2

  # AI - Gemini
  google_generative_ai: ^0.4.6

  # UI & Fonts
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.5

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.2.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

